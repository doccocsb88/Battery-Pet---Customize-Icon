name: Play Internal Release

on:
  workflow_dispatch:
  push:
    tags:
      - "play-internal-*"

jobs:
  internal-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: Emoji

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: Emoji

      - name: Decode release keystore
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
        run: |
          test -n "$SIGNING_KEY_STORE_BASE64"
          echo "$SIGNING_KEY_STORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-upload.jks"

      - name: Validate service account JSON structure
        env:
          SERVICE_ACCOUNT_JSON_PLAINTEXT: ${{ secrets.SERVICE_ACCOUNT_JSON_PLAINTEXT }}
        run: |
          test -n "$SERVICE_ACCOUNT_JSON_PLAINTEXT"
          printf '%s' "$SERVICE_ACCOUNT_JSON_PLAINTEXT" > "$RUNNER_TEMP/play-service-account.json"
          python3 ../.agents/skills/android-playstore-setup/templates/validate-playstore.py \
            "$RUNNER_TEMP/play-service-account.json" \
            "co.q7labs.co.emoji" || exit 1

      - name: Upload AAB to Google Play internal track
        env:
          SERVICE_ACCOUNT_JSON_PLAINTEXT: ${{ secrets.SERVICE_ACCOUNT_JSON_PLAINTEXT }}
          SIGNING_KEY_STORE_FILE: ${{ runner.temp }}/release-upload.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: bundle exec fastlane android internal
